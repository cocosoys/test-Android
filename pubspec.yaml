name: soys_app
description: "SOYS App - Flutter App Shell + H5 Hybrid Development"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # UI基础
  cupertino_icons: ^1.0.8

  # 状态管理 & 路由 & 依赖注入
  get: ^4.6.6

  # 屏幕适配
  flutter_screenutil: ^5.9.3

  # 网络请求
  dio: ^5.7.0
  dio_cache_interceptor: ^3.5.0
  dio_cache_interceptor_hive_store: ^3.2.2
  connectivity_plus: ^6.1.4

  # 本地存储
  shared_preferences: ^2.3.4
  sqflite: ^2.4.1
  path_provider: ^2.1.5
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # WebView
  webview_flutter: ^4.10.0

  # 路由注解（可选，代码生成式路由）
  # auto_route: ^8.2.0

  # 权限
  permission_handler: ^11.3.1

  # 图片加载 & 缓存
  cached_network_image: ^3.4.1
  extended_image: ^9.1.0

  # 下拉刷新 & 加载更多
  pull_to_refresh_flutter3: ^2.0.2
  easy_refresh: ^3.4.0

  # Toast & 弹窗
  flutter_smart_dialog: ^4.9.8+1

  # 加载动画
  flutter_spinkit: ^5.2.1
  lottie: ^3.2.0

  # SVG
  flutter_svg: ^2.0.16

  # 加密 & 安全
  crypto: ^3.0.6
  encrypt: ^5.0.3

  # 日志
  logger: ^2.5.0

  # 时间处理
  intl: ^0.20.2

  # URL策略
  url_launcher: ^6.3.1

  # 设备信息
  device_info_plus: ^11.2.0
  package_info_plus: ^8.1.3

  # 应用内更新
  open_file: ^3.5.10

  # 极光推送
  jpush_flutter: ^3.4.4

  # 分享
  share_plus: ^10.1.4

  # 扫码
  mobile_scanner: ^6.0.6

  # 图片选择 & 拍照
  image_picker: ^1.1.2

  # 照片保存
  # 文件选择
  file_picker: ^8.1.7

  # 网络状态
  # connectivity_plus 已在上方

  # 崩溃采集 & 埋点
  firebase_analytics: ^11.4.5
  firebase_crashlytics: ^4.3.5
  firebase_core: ^3.12.1

  # 本地通知
  flutter_local_notifications: ^18.0.1

  # 数据模型
  json_annotation: ^4.9.0

  # 应用锁定（生物识别）
  local_auth: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.14
  json_serializable: ^6.9.4

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/lottie/
    - assets/html/
